services:
  trek:
    image: mauriceboe/trek:latest
    container_name: TREK
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    ports:
      - 2341:3000
    environment:
       NODE_ENV: production
       JWT_SECRET: dOxZYTTZgXKMHkqLBIQVImayQXAVWdzGBPuFJKggzcgvgPJPXpWzqzKaUOIOGGIr
       PORT: 3000
       ALLOWED_ORIGINS: https://trek.ashish-syn-nas.synology.me
    volumes:
      - /volume1/docker/trek/data:/app/data:rw
      - /volume1/docker/trek/uploads:/app/uploads:rw
    restart: on-failure:5
